<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de contato</title>
  </head>
  <body
    style="
      background-color: #000000;
      color: #f0c258;
      font-family: Arial, Helvetica, sans-serif;
      padding: 20px;
      margin-bottom: 15px;
    "
  >
    <header>
      <h1>Entre em contato</h1>
      <nav>
        <ul>
          <li><a href="#campos" style="color: #f0c258;">Preencha os campos abaixo</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="campos">
        <form action="enviar.html" method="POST">
          <label for="nome">Nome:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            required
            placeholder="Nome completo"
            style="margin-bottom: 15px"
          /><br />

          <label for="contato">Contato: </label>
          <input
            type="number"
            id="contato"
            name="telefone"
            required
            placeholder="Número de telefone"
            style="margin-bottom: 15px"
          /><br />

          <label for="email">Email: </label>
          <input
            type="email"
            id="email"
            name="email"
            style="margin-bottom: 15px"
            required
          /><br />

          <label for="msg">Mensagem:</label><br />
          <input
            type="textarea"
            id="msg"
            name="msg"
            required
            style="margin-bottom: 15px"
          /><br />

          <select id="opcoes" name="opcoes" style="margin-bottom: 15px">
            <option value="1">Dúdivas</option>
            <option value="2">Sugestões</option>
            <option value="3">Suporte</option></select
          ><br />
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy;2026 - IFPI</p>
    </footer>
  </body>
</html>
